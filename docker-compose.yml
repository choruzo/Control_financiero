# FinControl — Docker Compose de PRODUCCIÓN
#
# Prerrequisitos:
#   1. cp .env.example .env  y editar todos los secrets
#   2. bash scripts/generate-certs.sh  (genera certificados SSL con mkcert)
#
# Uso:
#   docker compose up -d --build
#   docker compose ps            # verificar que todos los servicios están "healthy"
#
# Acceso: https://localhost

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fincontrol-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-fincontrol}
      POSTGRES_USER:     ${POSTGRES_USER:-fincontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Sin puerto expuesto al host en producción
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fincontrol}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fincontrol-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # Sin puerto expuesto al host en producción
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincontrol-api
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV:   production
      DEBUG:     "false"
    # Sin puertos expuestos; nginx actúa como proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${BACKEND_WORKERS:-4}

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincontrol-celery-worker
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      DEBUG:   "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks", "inspect", "ping", "-d", "celery@$$HOSTNAME", "--timeout", "5"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    command: >
      celery -A app.tasks worker
      --loglevel=info
      --concurrency=2

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincontrol-celery-beat
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      DEBUG:   "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping --timeout 5 2>/dev/null | grep -q OK"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    command: >
      celery -A app.tasks beat
      --loglevel=info

  # ── ML Service ───────────────────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: fincontrol-ml
    restart: unless-stopped
    volumes:
      - ml_models:/app/models
    environment:
      ML_APP_ENV:   production
      ML_DEBUG:     "false"
      ML_REDIS_URL: redis://redis:6379/3
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8001
      --workers 2

  # ── Frontend SvelteKit ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: fincontrol-frontend
    restart: unless-stopped
    environment:
      NODE_ENV:       production
      VITE_API_URL:   ${VITE_API_URL:-https://localhost/api}
      PORT:           "3000"
      HOST:           "0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx (reverse proxy + SSL) ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fincontrol-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Backups automáticos de PostgreSQL ────────────────────────────────────────
  postgres-backup:
    image: postgres:16-alpine
    container_name: fincontrol-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST:    postgres
      POSTGRES_USER:    ${POSTGRES_USER:-fincontrol}
      POSTGRES_DB:      ${POSTGRES_DB:-fincontrol}
      PGPASSWORD:       ${POSTGRES_PASSWORD}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
    volumes:
      - postgres_backups:/backups
      - ./scripts/pg-backup.sh:/usr/local/bin/pg-backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    # Ejecuta un backup al arrancar y luego todos los días a las 02:00
    entrypoint: >
      sh -c "chmod +x /usr/local/bin/pg-backup.sh &&
             /usr/local/bin/pg-backup.sh &&
             echo '0 2 * * * /usr/local/bin/pg-backup.sh >> /var/log/backup.log 2>&1'
             | crontab - && crond -f -l 2"

volumes:
  postgres_data:
  redis_data:
  ml_models:
  postgres_backups:
