name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + tests con coverage ──────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Instalar dependencias
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Lint (Ruff)
        run: |
          cd backend
          ruff check app/
          ruff format --check app/

      - name: Tests con coverage
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          pytest --cov=app --cov-report=xml --cov-fail-under=80 -v

      - name: Subir reporte de coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Frontend: lint + format + vitest + playwright ───────────────────────────
  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: |
          cd frontend
          npm ci

      - name: Verificar formato (Prettier)
        run: |
          cd frontend
          npm run format:check

      - name: Lint (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Comprobación de tipos (svelte-check)
        run: |
          cd frontend
          npm run check

      - name: Tests unitarios (Vitest)
        run: |
          cd frontend
          npm run test

      - name: Instalar navegadores Playwright
        run: |
          cd frontend
          npx playwright install chromium --with-deps

      - name: Tests E2E (Playwright)
        run: |
          cd frontend
          npm run test:e2e
        env:
          CI: true

      - name: Subir artefactos Playwright si hay fallos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── ML Service: lint ─────────────────────────────────────────────────────────
  ml-service:
    name: ML Service (Lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ml-service/pyproject.toml

      - name: Instalar Ruff
        run: pip install ruff>=0.8.0

      - name: Lint (Ruff)
        run: |
          cd ml-service
          ruff check app/
