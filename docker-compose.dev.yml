services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: fincontrol-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fincontrol}
      POSTGRES_USER: ${POSTGRES_USER:-fincontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fincontrol}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: fincontrol-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincontrol-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  # ── Celery Worker ──
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincontrol-celery-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks worker
      --loglevel=info
      --concurrency=2

  # ── Celery Beat (scheduler) ──
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincontrol-celery-beat
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks beat
      --loglevel=info

  # ── ML Service ──
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: fincontrol-ml
    restart: unless-stopped
    ports:
      - "${ML_SERVICE_PORT:-8001}:8001"
    volumes:
      - ./ml-service/app:/app/app
      - ./ml-service/tests:/app/tests
      - ml_models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - ML_APP_ENV=development
      - ML_DEBUG=true
      - ML_REDIS_URL=redis://redis:6379/3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8001
      --reload

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fincontrol-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
      - ./frontend/tests:/app/tests
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - NODE_ENV=development
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  ml_models:
