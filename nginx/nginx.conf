# FinControl — Nginx (desarrollo, HTTP)
# Uso: docker compose -f docker-compose.dev.yml up

upstream backend  { server backend:8000; }
upstream frontend { server frontend:3000; }
upstream ml       { server ml-service:8001; }

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # Backend API
    location /api/ {
        proxy_pass         http://backend/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Swagger UI del backend
    location /docs {
        proxy_pass         http://backend/docs;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
    location /openapi.json {
        proxy_pass         http://backend/openapi.json;
        proxy_set_header   Host $host;
    }

    # ML Service (acceso opcional en dev)
    location /ml/ {
        proxy_pass         http://ml/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Frontend SvelteKit (incluye WebSocket HMR en dev)
    location / {
        proxy_pass             http://frontend;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_http_version     1.1;
        proxy_read_timeout     120s;
    }
}
